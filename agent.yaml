name: twitter-agent
display_name: Twitter (X) Research Agent
description: >
  Research agent for public X (Twitter) via xAI Grok's server-side search.
  Modes: search_tweets (semantic post search), search_accounts (find relevant
  handles), trending (what's happening now, with active/resolved status),
  expert_opinions (how credible practitioners lean on a tech/architecture
  choice). Cross-checks the web where useful. Returns structured, inline-cited
  Markdown for a calling program. Public X only — no private home timeline.
version: 0.2.0
category: research
author:
  name: Primordial Morpheus
  github: andybrowning5

runtime:
  language: node
  run_command: node bundle.mjs
  setup_command: test -f bundle.mjs || (npm install && npm run build)
  dependencies: package.json
  default_provider: xai

model: grok-4.3

keys:
  - provider: xai
    required: true

inputs:
  - name: query
    type: string
    required: true
    description: >
      What to find on X, in natural language. Examples: "the strongest
      arguments people are making against the new EU AI rules", "developers
      reacting to the latest React release", "who are the most-cited accounts
      on small-model fine-tuning".
  - name: mode
    type: string
    required: false
    default: search_tweets
    description: >
      One of: "search_tweets" (default — semantic search for posts on a topic,
      auto-grouped by stance for debates or by failure mode for release/bug
      intel); "search_accounts" (identify the relevant accounts/handles for a
      topic and what they post); "trending" (what's being discussed right now,
      each thread tagged active/resolved/unclear); "expert_opinions" (for a
      system/architecture/tech-choice decision, how credible practitioners lean,
      cross-checked against engineering blogs and docs).
  - name: handles
    type: string
    required: false
    description: >
      Optional comma-separated list of X handles (without @, max 20). WARNING:
      this RESTRICTS the search to ONLY these accounts — it does not "prefer" or
      "boost" them. Leave it empty to search all of X. Use it only when you
      truly want results from these handles alone. Example: "sama,karpathy".
  - name: exclude_handles
    type: string
    required: false
    description: >
      Optional comma-separated list of X handles (without @, max 20) to exclude
      from results.
  - name: from_date
    type: string
    required: false
    description: Optional earliest date for posts, ISO 8601 (YYYY-MM-DD).
  - name: to_date
    type: string
    required: false
    description: Optional latest date for posts, ISO 8601 (YYYY-MM-DD).

outputs:
  - name: response
    type: string
    description: >
      Structured Markdown built for a calling program: a "## Summary" headline,
      mode-specific sections (## Findings / ## Accounts / ## Threads / decision
      sections), a "## Coverage" note on signal and date window, and a final
      "## Sources" list of cited posts/pages labeled [X] or [web]. Quotes are
      verbatim or omitted; unknown fields are "—"; nothing is fabricated.

tags:
  - twitter
  - x
  - social
  - search
  - grok
  - trending
  - research
  - accounts
  - expert-opinions
  - architecture
  - opinions
  - sentiment
